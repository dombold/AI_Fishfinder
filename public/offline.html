<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — AI Fishfinder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0B1929;
      color: #E8F4F8;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .icon {
      width: 64px;
      height: 64px;
      margin-bottom: 1.5rem;
      opacity: 0.6;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #C9A84C;
      margin-bottom: 0.75rem;
    }

    p {
      color: #8BA7BA;
      line-height: 1.7;
      max-width: 340px;
      margin-bottom: 2rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 260px;
    }

    a {
      display: block;
      padding: 0.75rem 1.25rem;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: opacity 0.15s;
    }

    a:hover { opacity: 0.85; }

    .btn-primary {
      background: #3CBFAE;
      color: #0B1929;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.07);
      color: #E8F4F8;
      border: 1px solid rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>
  <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#3CBFAE" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1 1l22 22"/>
    <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
    <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
    <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
    <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
    <line x1="12" y1="20" x2="12.01" y2="20"/>
  </svg>

  <h1>You're Offline</h1>
  <p>Saved plans and your catch log are still available. Connect to the internet to generate new plans or sync your catches.</p>

  <div class="links">
    <a href="/saved-plans" class="btn-primary">View Saved Plans</a>
    <a href="/catch-log" class="btn-secondary">Catch Log</a>
  </div>
</body>
</html>
